name: Deploy

# Manual Terraform runner for modules under infra/. Plans are always safe to run;
# apply is gated by the `action` input AND by the GitHub Actions environment
# protection rules configured on `deploy-prod` (manual approval required).
#
# The IAM role is created by infra/iam-oidc-bootstrap/ (T-E01-05.sub1), which
# must be applied manually with a human's AWS credentials before this workflow
# will succeed.

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Terraform module directory (relative to repo root). Must be one of the directories that actually exists under infra/.'
        required: true
        type: choice
        options:
          - infra/bootstrap
          - infra/iam-oidc-bootstrap
      action:
        description: 'plan (safe, read-only) or apply (requires environment approval).'
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply

concurrency:
  group: deploy-${{ github.event.inputs.module }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  plan:
    name: terraform plan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      planfile: ${{ steps.plan.outputs.planfile }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::852973339602:role/github-oidc-deploy
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: ${{ github.event.inputs.module }}
        run: terraform init -input=false

      - name: Terraform plan
        id: plan
        working-directory: ${{ github.event.inputs.module }}
        run: |
          terraform plan -input=false -out=tfplan
          echo "planfile=${{ github.event.inputs.module }}/tfplan" >> "$GITHUB_OUTPUT"

      - name: Upload plan artefact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ github.event.inputs.module }}/tfplan
          retention-days: 7
          if-no-files-found: error

  apply:
    name: terraform apply
    needs: plan
    if: github.event.inputs.action == 'apply'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Environment protection: configure `deploy-prod` in repo settings to
    # require manual reviewer approval before this job runs.
    environment: deploy-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::852973339602:role/github-oidc-deploy
          aws-region: ap-southeast-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: ${{ github.event.inputs.module }}
        run: terraform init -input=false

      - name: Download plan artefact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: ${{ github.event.inputs.module }}

      - name: Terraform apply
        working-directory: ${{ github.event.inputs.module }}
        run: terraform apply -input=false -auto-approve tfplan
